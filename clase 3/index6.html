<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Layout Responsive con CSS Grid</title>
  <style>
    /* Layout móvil: una columna */
    .container {
      display: grid;
      grid-template-columns: 1fr;
      gap: 10px;
      padding: 10px;
    }

    .item {
      background-color: #4CAF50;
      color: white;
      padding: 20px;
      font-size: 1.2em;
      text-align: center;
      border-radius: 5px;
    }

    /* TODO: Agregar media queries para pantallas >= 600px */

  </style>
</head>
<body>
  <div class="container">
    <div class="item">Elemento 1</div>
    <div class="item">Elemento 2</div>
    <div class="item">Elemento 3</div>
    <div class="item">Elemento 4</div>
    <div class="item">Elemento 5</div>
  </div>
</body>
</html>
