<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <title>Ejemplo BEM y Pseudoclases</title>
  <style>
    .card {
      background-color: white;
      padding: 20px;
      border-radius: 8px;
      transition: background-color 0.3s ease;
      width: 200px;
      margin: 20px auto;
      cursor: pointer;
      border: 1px solid #ccc;
    }

    .card--highlighted {
      background-color: #e0f7ff;
    }

    .card--highlighted:hover {
      background-color: #f0f8ff;
    }

    .card:focus-visible {
      outline: 3px solid #005fcc;
      outline-offset: 2px;
    }
  </style>
</head>
<body>
  <div tabindex="0" class="card">Card normal (focus con teclado)</div>
  <div tabindex="0" class="card card--highlighted">Card destacada (hover y focus)</div>
</body>
</html>
